services:
  db:
    image: postgres:16-alpine
    container_name: rerp_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: rerp
      POSTGRES_PASSWORD: rerp_password
      POSTGRES_DB: rerp
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./docs/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    # ports:
    #   - "5432:5432"   # 如需本机直连，改为 "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rerp"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: rerp_backend
    restart: unless-stopped
    env_file: ./backend/.env
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"

  frontend:
    image: node:22-alpine
    container_name: rerp_frontend_dev
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run build"
    profiles: ["build"]   # 仅在 build 时运行

  nginx:
    image: nginx:alpine
    container_name: rerp_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
      # - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./uploads:/app/uploads:ro
    depends_on:
      - backend

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: rerp_cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token eyJhIjoiYjk3MmVkOWU0ZTBlMDg5NjU0OWQ3MWFkZTk5Y2ExNWIiLCJ0IjoiZTk5MTY0NTktNDAyMy00ZjI1LWJmMTktN2FkOWI5MDkwZDQ1IiwicyI6IlpqUXpZakU1TnpRdFpXVmpOUzAwWTJFNUxUZzRNR0V0Tm1VM01qY3lNamN6TXpKaiJ9
    depends_on:
      - nginx

volumes:
  pg_data:
